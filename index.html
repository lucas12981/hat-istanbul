<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAT | Premium İstanbul Bağlantısı</title>
    
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --bg-dark: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent-gold: #ffcf5e;
            --glass-border: rgba(255, 255, 255, 0.1);
            --error-red: #ff4b5c;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            height: 100%;
        }

        #app {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1b25, #0a0b10);
            position: relative;
            padding-bottom: 40px;
        }

        /* Yükleme Ekranı */
        .loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lale-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-neon)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--primary-neon)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-neon)); }
        }

        /* Header & Profil */
        header {
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            border: 2px solid var(--primary-neon);
            object-fit: cover;
            background: #222;
        }

        .welcome-text {
            font-size: 0.8rem;
            color: #aaa;
        }

        .user-name {
            font-weight: 700;
            display: block;
            font-size: 1rem;
        }

        /* Form Alanı */
        .main-container {
            padding: 0 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
            transition: 0.4s ease;
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-neon);
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            appearance: none;
            outline: none;
            cursor: pointer;
        }

        .btn-luxury {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-luxury:active { transform: scale(0.96); }

        /* Vagon Görseli */
        .wagon-display {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .wagon {
            flex: 1;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
            color: #555;
        }

        .wagon.active {
            background: var(--primary-neon);
            color: var(--bg-dark);
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 242, 255, 0.5);
            border-color: white;
        }

        /* Lale Pay Bölümü */
        .lale-pay-section {
            margin-top: 30px;
        }

        .wallet-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #2c3e50, #000000);
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .istanbul-kart-icon {
            width: 40px;
            height: 25px;
            background: #ff4b5c;
            border-radius: 4px;
        }

        /* Custom Modal / Alert */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .modal-content {
            background: #16171d;
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 35px;
            width: 80%;
            max-width: 320px;
            text-align: center;
            transform: scale(0.8);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-overlay.show .modal-content { transform: scale(1); }

        .modal-btn {
            margin-top: 25px;
            padding: 15px 40px;
            background: white;
            color: black;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
        }

        .hidden { display: none; }

    </style>
</head>
<body>

    <div id="custom-modal" class="modal-overlay">
        <div class="modal-content">
            <div style="font-size: 3rem; margin-bottom: 15px;">⚠️</div>
            <h3 style="margin:0; font-size: 1.4rem;">Eksik Seçim</h3>
            <p style="color: #888; margin-top: 10px; font-size: 0.9rem;">Lütfen devam etmek için bir istasyon ve hedef belirleyin.</p>
            <button class="modal-btn" onclick="closeModal()">TAMAM</button>
        </div>
    </div>

    <div id="loader" class="loader-screen">
        <div class="lale-logo"></div>
        <h2 style="margin-top:20px; letter-spacing: 5px; font-weight: 200;">İSTANBUL</h2>
    </div>

    <div id="app">
        <header>
            <div class="user-profile">
                <img src="https://via.placeholder.com/150" alt="Profil" class="avatar" id="user-photo">
                <div>
                    <span class="welcome-text" id="greeting-text">Yükleniyor...</span>
                    <span class="user-name">Kullanıcı Profili</span>
                </div>
            </div>
            <div style="color: var(--primary-neon); font-weight: 900; font-size: 1.5rem;">HAT</div>
        </header>

        <main class="main-container">
            <section class="glass-card">
                <span class="input-label">Nereden?</span>
                <select id="origin-station">
                    <option value="">İstasyon Seçiniz</option>
                    <option value="yenikapi">Yenikapı</option>
                    <option value="gayrettepe">Gayrettepe</option>
                    <option value="uskudar">Üsküdar</option>
                    <option value="levent">Levent</option>
                </select>

                <span class="input-label">Nereye Aktarma?</span>
                <select id="target-transport">
                    <option value="">Aktarma Seçiniz</option>
                    <option value="vapur">Vapur (Ferry)</option>
                    <option value="marmaray">Marmaray</option>
                    <option value="metrobus">Metrobüs</option>
                </select>

                <button id="main-action-btn" onclick="calculateRoute()" class="btn-luxury">EN HIZLI YOLU BUL</button>
            </section>

            <div id="result-card" class="glass-card hidden">
                <div style="text-align: center; margin-bottom: 15px;">
                    <span style="color: var(--accent-gold); font-size: 0.8rem; font-weight: bold; letter-spacing: 1px;">⚡ OPTİMİZE EDİLMİŞ KONUM</span>
                </div>
                <div class="wagon-display">
                    <div class="wagon" id="w1">1</div>
                    <div class="wagon" id="w2">2</div>
                    <div class="wagon" id="w3">3</div>
                    <div class="wagon" id="w4">4</div>
                </div>
                <p id="instruction-text" style="text-align: center; font-size: 0.95rem; line-height: 1.6; color: #eee; padding: 0 10px;"></p>
                <div style="text-align: center; color: var(--primary-neon); font-size: 1.3rem; font-weight: 900; margin-top: 15px;">
                    +<span id="minutes">0</span> DAKİKA KAZANÇ
                </div>
            </div>

            <section class="lale-pay-section">
                <span class="input-label">Lale Pay & İstanbul Kart</span>
                <div class="wallet-card">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div class="istanbul-kart-icon"></div>
                        <div>
                            <div style="font-size: 0.8rem; color: #888;">Bakiyeniz</div>
                            <div style="font-weight: bold; font-size: 1.1rem;">142.50 ₺</div>
                        </div>
                    </div>
                    <button style="background:none; border: 1px solid var(--primary-neon); color: var(--primary-neon); padding: 8px 15px; border-radius: 10px; font-size: 0.7rem; font-weight: bold;">YÜKLE</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        // Gerçek Optimizasyon Verileri
        const stationData = {
            "yenikapi-vapur": { wagon: 1, text: "En ön vagonu kullanın. İDO/Vapur çıkış kapısı tam karşınıza gelecek ve kalabalığı baypas edeceksiniz.", save: 6 },
            "yenikapi-marmaray": { wagon: 4, text: "En arka vagonu seçin. Marmaray aktarma tüneli doğrudan bu noktada başlar.", save: 4 },
            "gayrettepe-metrobus": { wagon: 2, text: "2. vagonda kalın. Metrobüs bağlantı asansörleri ve yürüyen bantlar burada sizi bekliyor.", save: 9 },
            "uskudar-vapur": { wagon: 1, text: "1. vagonu tercih edin. İskele çıkışı için en kısa yürüme mesafesi burasıdır.", save: 5 },
            "uskudar-marmaray": { wagon: 2, text: "2. vagona binin. Marmaray aktarma holüne giden ana merdivenlerin tam önü.", save: 4 },
            "levent-metrobus": { wagon: 4, text: "En son vagonu kullanın. Zincirlikuyu/Metrobüs ve AVM çıkışlarına en yakın nokta.", save: 7 }
        };

        function showModal() {
            const modal = document.getElementById('custom-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        function updateGreeting() {
            const hour = new Date().getHours();
            const gt = document.getElementById('greeting-text');
            if (hour >= 5 && hour < 12) gt.innerText = "Günaydın";
            else if (hour >= 12 && hour < 18) gt.innerText = "İyi Günler";
            else gt.innerText = "İyi Akşamlar";
        }

        window.addEventListener('load', () => {
            updateGreeting();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 2000);
        });

        function calculateRoute() {
            const origin = document.getElementById('origin-station').value;
            const target = document.getElementById('target-transport').value;
            const btn = document.getElementById('main-action-btn');
            const key = `${origin}-${target}`;
            const card = document.getElementById('result-card');
            
            // Seçim yapılmamışsa yeni modalı göster
            if (!origin || !target) {
                showModal();
                return;
            }

            // Buton Animasyonu (İşleniyor hissi)
            btn.innerText = "ANALİZ EDİLİYOR...";
            btn.style.opacity = "0.7";

            setTimeout(() => {
                document.querySelectorAll('.wagon').forEach(w => w.classList.remove('active'));
                btn.innerText = "EN HIZLI YOLU BUL";
                btn.style.opacity = "1";

                if (stationData[key]) {
                    const data = stationData[key];
                    card.classList.remove('hidden');
                    document.getElementById('instruction-text').innerText = data.text;
                    document.getElementById('minutes').innerText = data.save;
                    document.getElementById(`w${data.wagon}`).classList.add('active');
                    
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                } else {
                    // Veri bulunamadığında da şık bir geri bildirim
                    alert("Bu rota için optimizasyon çalışması devam ediyor.");
                }
            }, 800);
        }
    </script>
</body>
</html>
