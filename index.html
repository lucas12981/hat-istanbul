<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAT | İstanbul Bağlantı</title>
    
    <style>
        :root {
            --primary-neon: #00f2ff;
            --bg-white: #ffffff;
            --text-dark: #1a1a1a;
            --gray-light: #f4f4f4;
            --accent-red: #ff4b5c;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-white);
            color: var(--text-dark);
            height: 100%;
            display: flex;
            justify-content: center;
        }

        #app {
            width: 100%;
            max-width: 450px;
            background: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
        }

        /* Pantalla de Carga */
        .loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .neon-circle {
            width: 60px; height: 60px;
            border: 4px solid #eee;
            border-top: 4px solid var(--primary-neon);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Header */
        header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }

        .logo {
            font-weight: 900;
            font-size: 1.8rem;
            letter-spacing: -1px;
        }

        .logo span { color: var(--primary-neon); }

        #greeting {
            font-size: 0.9rem;
            font-weight: 600;
            color: #888;
        }

        /* Cuerpo Principal */
        main {
            padding: 20px;
        }

        .search-box {
            background: var(--gray-light);
            padding: 25px;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .subtitle {
            margin-top: 0;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #666;
            margin-bottom: 15px;
        }

        .input-group select {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group select:focus {
            border-color: var(--primary-neon);
        }

        .btn-calculate {
            width: 100%;
            padding: 18px;
            background: var(--text-dark);
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Resultados */
        #result-card {
            background: white;
            border: 2px solid var(--primary-neon);
            border-radius: 24px;
            padding: 20px;
            margin-top: 10px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .train-visual {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 20px 0;
        }

        .wagon {
            width: 22%;
            height: 45px;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            color: #bbb;
            transition: 0.5s;
        }

        .wagon.active {
            background: var(--primary-neon);
            color: var(--text-dark);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        #instruction-text {
            font-size: 0.95rem;
            line-height: 1.5;
            text-align: center;
            color: #444;
        }

        .time-save {
            text-align: center;
            margin-top: 15px;
            color: var(--accent-red);
            font-weight: 800;
        }

        .hidden { display: none; }

        /* Mapa Falso Futurista */
        #map-placeholder {
            height: 150px;
            background: #f9f9f9;
            margin-top: 30px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed #ddd;
            font-size: 0.8rem;
            color: #aaa;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="loader" class="loader-screen">
            <div class="neon-circle"></div>
            <p style="font-weight: bold; letter-spacing: 2px;">HAT ISTANBUL</p>
        </div>

        <header>
            <div class="logo">H<span>A</span>T</div>
            <div id="greeting">Yükleniyor...</div>
        </header>

        <main>
            <section class="search-box">
                <p class="subtitle">Bağlantı Optimizasyonu</p>
                <div class="input-group">
                    <select id="origin-station">
                        <option value="">Metro İstasyonu Seçin</option>
                        <option value="yenikapi">Yenikapı</option>
                        <option value="gayrettepe">Gayrettepe</option>
                        <option value="uskudar">Üsküdar</option>
                        <option value="levent">Levent</option>
                    </select>
                </div>
                <div class="input-group">
                    <select id="target-transport">
                        <option value="">Aktarma Hedefi</option>
                        <option value="vapur">Vapur (Ferry)</option>
                        <option value="marmaray">Marmaray</option>
                        <option value="metrobus">Metrobüs</option>
                    </select>
                </div>
                <button onclick="calculateRoute()" class="btn-calculate">EN HIZLI YOLU BUL</button>
            </section>

            <div id="result-card" class="hidden">
                <h4 style="text-align:center; margin:0; color:#888;">İDEAL VAGON</h4>
                <div class="train-visual">
                    <div class="wagon" id="w1">1</div>
                    <div class="wagon" id="w2">2</div>
                    <div class="wagon" id="w3">3</div>
                    <div class="wagon" id="w4">4</div>
                </div>
                <p id="instruction-text"></p>
                <div class="time-save">
                    +<span id="minutes">0</span> DAKİKA KAZANÇ
                </div>
            </div>

            <div id="map-placeholder">
                Canlı Bağlantı Haritası (Aktif)
            </div>
        </main>
    </div>

    <script>
        const stationData = {
            "yenikapi-vapur": { wagon: 1, text: "En ön vagona binin. İDO/Vapur çıkışı tam karşınızda olacak.", save: 6 },
            "yenikapi-marmaray": { wagon: 4, text: "En arka vagona binin. Marmaray aktarma tüneli burada çok daha yakın.", save: 4 },
            "gayrettepe-metrobus": { wagon: 2, text: "2. vagonda kalın. Metrobüs yürüme bandına giden asansörlerin tam önü.", save: 9 },
            "uskudar-vapur": { wagon: 1, text: "1. vagonu seçin. Şehir Hatları iskelesine çıkış kapısı burada.", save: 5 },
            "levent-metrobus": { wagon: 4, text: "En son vagonu kullanın. Plaza ve Metrobüs çıkışına en yakın nokta.", save: 7 }
        };

        // Saludo según la hora
        function updateGreeting() {
            const hour = new Date().getHours();
            const g = document.getElementById('greeting');
            if (hour >= 5 && hour < 12) g.innerText = "Günaydın!";
            else if (hour >= 12 && hour < 18) g.innerText = "İyi Günler!";
            else g.innerText = "İyi Akşamlar!";
        }

        // Simulación de carga
        window.addEventListener('load', () => {
            updateGreeting();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1800);
        });

        // Función Principal
        function calculateRoute() {
            const origin = document.getElementById('origin-station').value;
            const target = document.getElementById('target-transport').value;
            const key = `${origin}-${target}`;
            const card = document.getElementById('result-card');
            
            // Resetear vagones
            document.querySelectorAll('.wagon').forEach(w => w.classList.remove('active'));

            if (stationData[key]) {
                const data = stationData[key];
                card.classList.remove('hidden');
                document.getElementById('instruction-text').innerText = data.text;
                document.getElementById('minutes').innerText = data.save;
                document.getElementById(`w${data.wagon}`).classList.add('active');
            } else {
                alert("Lütfen bir istasyon ve hedef seçin.");
            }
        }
    </script>
</body>
</html>
