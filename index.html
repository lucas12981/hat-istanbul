<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAT | Premium İstanbul Bağlantısı</title>
    
    <style>
        :root {
            --primary-neon: #00f2ff;
            --secondary-neon: #7000ff;
            --bg-dark: #0a0b10;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --accent-gold: #ffcf5e;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
        }

        #app {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1a1b25, #0a0b10);
            position: relative;
            padding-bottom: 40px;
        }

        /* Yükleme Ekranı */
        .loader-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lale-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(45deg, var(--primary-neon), var(--secondary-neon));
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* Basit Lale formu */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-neon)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--primary-neon)); }
            100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary-neon)); }
        }

        /* Header & Profil */
        header {
            padding: 30px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 15px;
            border: 2px solid var(--primary-neon);
            object-fit: cover;
            background: #222;
        }

        .welcome-text {
            font-size: 0.8rem;
            color: #aaa;
        }

        .user-name {
            font-weight: 700;
            display: block;
            font-size: 1rem;
        }

        /* Form Alanı */
        .main-container {
            padding: 0 20px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .input-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-neon);
            margin-bottom: 10px;
            display: block;
        }

        select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            appearance: none;
            outline: none;
        }

        .btn-luxury {
            width: 100%;
            padding: 20px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            border: none;
            border-radius: 18px;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-luxury:active { transform: scale(0.97); }

        /* Vagon Görseli */
        .wagon-display {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .wagon {
            flex: 1;
            height: 50px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid transparent;
        }

        .wagon.active {
            background: var(--primary-neon);
            color: var(--bg-dark);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.3);
        }

        /* Lale Pay Bölümü */
        .lale-pay-section {
            margin-top: 30px;
        }

        .wallet-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(135deg, #2c3e50, #000000);
            padding: 20px;
            border-radius: 20px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .istanbul-kart-icon {
            width: 40px;
            height: 25px;
            background: #ff4b5c;
            border-radius: 4px;
        }

        .hidden { display: none; }

    </style>
</head>
<body>

    <div id="loader" class="loader-screen">
        <div class="lale-logo"></div>
        <h2 style="margin-top:20px; letter-spacing: 5px; font-weight: 200;">İSTANBUL</h2>
    </div>

    <div id="app">
        <header>
            <div class="user-profile">
                <img src="https://via.placeholder.com/150" alt="Profil" class="avatar" id="user-photo">
                <div>
                    <span class="welcome-text" id="greeting-text">Yükleniyor...</span>
                    <span class="user-name">Hoş Geldiniz</span>
                </div>
            </div>
            <div style="color: var(--primary-neon); font-weight: 900; font-size: 1.5rem;">HAT</div>
        </header>

        <main class="main-container">
            <section class="glass-card">
                <span class="input-label">Nereden?</span>
                <select id="origin-station">
                    <option value="">İstasyon Seçiniz</option>
                    <option value="yenikapi">Yenikapı</option>
                    <option value="gayrettepe">Gayrettepe</option>
                    <option value="uskudar">Üsküdar</option>
                    <option value="levent">Levent</option>
                </select>

                <span class="input-label">Nereye Aktarma?</span>
                <select id="target-transport">
                    <option value="">Aktarma Seçiniz</option>
                    <option value="vapur">Vapur (Ferry)</option>
                    <option value="marmaray">Marmaray</option>
                    <option value="metrobus">Metrobüs</option>
                </select>

                <button onclick="calculateRoute()" class="btn-luxury">ROTA ANALİZİ YAP</button>
            </section>

            <div id="result-card" class="glass-card hidden">
                <div style="text-align: center; margin-bottom: 15px;">
                    <span style="color: var(--accent-gold); font-size: 0.9rem; font-weight: bold;">⚡ ÖNERİLEN KONUM</span>
                </div>
                <div class="wagon-display">
                    <div class="wagon" id="w1">1</div>
                    <div class="wagon" id="w2">2</div>
                    <div class="wagon" id="w3">3</div>
                    <div class="wagon" id="w4">4</div>
                </div>
                <p id="instruction-text" style="text-align: center; font-size: 0.9rem; line-height: 1.6; color: #ddd;"></p>
                <div style="text-align: center; color: var(--primary-neon); font-size: 1.2rem; font-weight: 800; margin-top: 15px;">
                    +<span id="minutes">0</span> DK TASARRUF
                </div>
            </div>

            <section class="lale-pay-section">
                <span class="input-label">Lale Pay & İstanbul Kart</span>
                <div class="wallet-card">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <div class="istanbul-kart-icon"></div>
                        <div>
                            <div style="font-size: 0.8rem; color: #888;">Bakiyeniz</div>
                            <div style="font-weight: bold; font-size: 1.1rem;">142.50 ₺</div>
                        </div>
                    </div>
                    <button style="background:none; border: 1px solid var(--primary-neon); color: var(--primary-neon); padding: 8px 15px; border-radius: 10px; font-size: 0.7rem;">YÜKLE</button>
                </div>
            </section>
        </main>
    </div>

    <script>
        const stationData = {
            "yenikapi-vapur": { wagon: 1, text: "En ön vagonu kullanın. İDO/Vapur çıkış kapısı tam karşınıza gelecek.", save: 6 },
            "yenikapi-marmaray": { wagon: 4, text: "En arka vagonu seçin. Marmaray aktarma tüneli doğrudan bu noktada.", save: 4 },
            "gayrettepe-metrobus": { wagon: 2, text: "2. vagonda kalın. Metrobüs bağlantı asansörleri burada bekliyor.", save: 9 },
            "uskudar-vapur": { wagon: 1, text: "1. vagonu tercih edin. İskele çıkışı için en kısa mesafe burası.", save: 5 },
            "levent-metrobus": { wagon: 4, text: "En son vagonu kullanın. Metrobüs ve AVM çıkışlarına en yakın nokta.", save: 7 }
        };

        function updateGreeting() {
            const hour = new Date().getHours();
            const gt = document.getElementById('greeting-text');
            if (hour >= 5 && hour < 12) gt.innerText = "Günaydın";
            else if (hour >= 12 && hour < 18) gt.innerText = "İyi Günler";
            else gt.innerText = "İyi Akşamlar";
        }

        window.addEventListener('load', () => {
            updateGreeting();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 800);
            }, 2000);
        });

        function calculateRoute() {
            const origin = document.getElementById('origin-station').value;
            const target = document.getElementById('target-transport').value;
            const key = `${origin}-${target}`;
            const card = document.getElementById('result-card');
            
            document.querySelectorAll('.wagon').forEach(w => w.classList.remove('active'));

            if (stationData[key]) {
                const data = stationData[key];
                card.classList.remove('hidden');
                document.getElementById('instruction-text').innerText = data.text;
                document.getElementById('minutes').innerText = data.save;
                document.getElementById(`w${data.wagon}`).classList.add('active');
                
                // Scroll to result
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            } else {
                alert("Lütfen geçerli bir rota seçiniz.");
            }
        }
    </script>
</body>
</html>
