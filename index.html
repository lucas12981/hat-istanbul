<!-- ===== 🚢 FERRY EXPERIENCE PRO COMPLETO ===== -->

<!-- Leaflet (MAPA GRATIS REAL) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- BOTÓN -->
<button onclick="startFerryExperience()" style="
background:#ff0000;
color:#fff;
border:none;
padding:14px 20px;
border-radius:14px;
font-size:15px;
cursor:pointer;
margin:10px;
box-shadow:0 0 15px rgba(255,0,0,0.6);
transition:0.3s;
">
🚢 En Yakın Vapur
</button>

<!-- CONTENEDOR FULLSCREEN -->
<div id="ferryMapContainer" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:9999;
">

  <div id="ferryMap" style="width:100%; height:100%;"></div>

  <!-- BOTÓN CERRAR -->
  <button onclick="closeFerryMap()" style="
  position:absolute;
  top:20px;
  right:20px;
  background:#ff0000;
  color:#fff;
  border:none;
  padding:10px 12px;
  border-radius:10px;
  z-index:10000;
  font-size:14px;
  ">
  ✖
  </button>

</div>

<script>
let ferryMap;

// ===== INICIAR =====
function startFerryExperience() {

  if (!navigator.geolocation) {
    alert("Konum desteklenmiyor");
    return;
  }

  showFerryMessage("📍 Konum alınıyor...");

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      openFerryMap(lat, lng);
    },
    () => {
      alert("Konum alınamadı");
    }
  );
}

// ===== ABRIR MAPA =====
function openFerryMap(lat, lng) {

  document.getElementById("ferryMapContainer").style.display = "block";

  setTimeout(() => {

    ferryMap = L.map('ferryMap', {
      zoomControl: false
    }).setView([lat, lng], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(ferryMap);

    // marcador usuario
    const userMarker = L.circleMarker([lat, lng], {
      radius: 8,
      color: "#fff",
      fillColor: "#ff0000",
      fillOpacity: 1
    }).addTo(ferryMap);

    userMarker.bindPopup("📍 Buradasın").openPopup();

    // animación leve centrado
    ferryMap.flyTo([lat, lng], 14);

    searchNearbyFerries(lat, lng);

  }, 300);
}

// ===== BUSCAR FERRYS =====
function searchNearbyFerries(lat, lng) {

  showFerryMessage("🚢 Vapur aranıyor...");

  const query = `
    [out:json];
    node
      ["amenity"="ferry_terminal"]
      (around:4000, ${lat}, ${lng});
    out;
  `;

  fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
  })
  .then(res => res.json())
  .then(data => {

    if (!data.elements.length) {
      showFerryMessage("❗ Yakında vapur yok");
      return;
    }

    data.elements.forEach((ferry, i) => {

      const fLat = ferry.lat;
      const fLng = ferry.lon;
      const name = ferry.tags.name || "Vapur İskelesi";

      setTimeout(() => {
        L.marker([fLat, fLng]).addTo(ferryMap)
          .bindPopup(`
            <b>${name}</b><br><br>
            <button onclick="goToFerry(${fLat}, ${fLng})" style="
              background:#ff0000;
              color:#fff;
              border:none;
              padding:6px 10px;
              border-radius:8px;
            ">
            Git
            </button>
          `);
      }, i * 200); // animación aparición

    });

    showFerryMessage("✅ Yakındaki vapurlar bulundu");

  })
  .catch(() => {
    showFerryMessage("❌ Veri alınamadı");
  });
}

// ===== IR A MAPS =====
function goToFerry(lat, lng) {
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

// ===== CERRAR =====
function closeFerryMap() {
  document.getElementById("ferryMapContainer").style.display = "none";

  if (ferryMap) {
    ferryMap.remove();
  }
}

// ===== MENSAJES =====
function showFerryMessage(text) {

  let box = document.getElementById("ferryMsg");

  if (!box) {
    box = document.createElement("div");
    box.id = "ferryMsg";

    box.style.position = "fixed";
    box.style.bottom = "20px";
    box.style.left = "50%";
    box.style.transform = "translateX(-50%)";
    box.style.background = "rgba(0,0,0,0.85)";
    box.style.color = "#fff";
    box.style.padding = "12px 18px";
    box.style.borderRadius = "14px";
    box.style.zIndex = "10000";
    box.style.fontSize = "14px";
    box.style.boxShadow = "0 0 15px rgba(255,0,0,0.4)";
    box.style.fontFamily = "sans-serif";
  }

  box.innerText = text;
  document.body.appendChild(box);

  setTimeout(() => {
    box.remove();
  }, 2500);
}
</script>
