<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lale Life PRO</title>

<style>
:root{
--gold:#FFD700;
--bg:#0b0b0b;
--card:#1a1a1a;
}

body{
margin:0;
font-family:'Arial';
background:var(--bg);
color:white;
}

header{
text-align:center;
padding:20px;
font-size:22px;
font-weight:bold;
color:var(--gold);
}

.container{
padding:15px;
}

.card{
background:var(--card);
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 0 15px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

h3{
margin-top:0;
color:var(--gold);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,var(--gold),#fff);
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.result{
margin-top:12px;
font-size:14px;
line-height:1.5;
opacity:0;
transform:translateY(10px);
transition:0.4s;
}

.result.show{
opacity:1;
transform:translateY(0);
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:none;
}

.loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
z-index:999;
}
</style>
</head>

<body>

<div id="loader" class="loader">LALE</div>

<header>🌷 LALE LIFE PRO</header>

<div class="container">

<!-- FAL -->
<div class="card">
<h3>☕ Kahve Falı</h3>
<button onclick="fal()">Falına Bak</button>
<div id="fal" class="result"></div>
</div>

<!-- ECZANE -->
<div class="card">
<h3>🏥 Nöbetçi Eczane</h3>
<button onclick="eczane()">Konuma Göre Bul</button>
</div>

<!-- DESTINO -->
<div class="card">
<h3>🧿 Günlük Mesaj</h3>
<button onclick="kader()">Mesaj Al</button>
<div id="kader" class="result"></div>
</div>

<!-- AMOR -->
<div class="card">
<h3>❤️ Aşk Uyumu</h3>
<input id="n1" placeholder="Adın">
<input id="n2" placeholder="Onun adı">
<button onclick="ask()">Hesapla</button>
<div id="ask" class="result"></div>
</div>

</div>

<script>

// LOADER
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},1500);

// ☕ FAL PRO
function fal(){
const zones=[
"açık bir yol",
"kuş figürü",
"kalp şekli",
"yoğun gölge",
"halka",
"iki yol ayrımı"
];

let selected=[];
for(let i=0;i<3;i++){
selected.push(zones[Math.floor(Math.random()*zones.length)]);
}

let text="Fincanında "+selected.join(", ")+" görüyorum. ";

if(text.includes("yol")) text+="Hayatında yeni bir başlangıç var. ";
if(text.includes("kuş")) text+="Beklediğin haber geliyor. ";
if(text.includes("kalp")) text+="Aşk hayatın hareketleniyor. ";
if(text.includes("gölge")) text+="Sıkıntılar bitmek üzere. ";
if(text.includes("halka")) text+="Para ve kısmet görünüyor. ";
if(text.includes("iki")) text+="Önemli bir karar vereceksin. ";

text+="Kısmetin açık.";

show("fal",text);
}

// 🏥 ECZANE
function eczane(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lon=pos.coords.longitude;
window.open(`https://www.google.com/maps/search/eczane/@${lat},${lon},15z`);
});
}

// 🧿 DESTINO
function kader(){
const list=[
"Bugün önemli bir gün olabilir.",
"Bir fırsat seni bekliyor.",
"Sabırla ilerle.",
"Kalbini dinle.",
"Şans senden yana."
];

show("kader",list[Math.floor(Math.random()*list.length)]);
}

// ❤️ AMOR
function ask(){
const a=document.getElementById("n1").value;
const b=document.getElementById("n2").value;

if(!a||!b){alert("İsim gir");return;}

const score=Math.floor(Math.random()*100);

let txt="";
if(score>80) txt="Mükemmel uyum 💖";
else if(score>50) txt="Güzel bağ 💕";
else txt="Zor ama mümkün 💔";

show("ask",`${a} ❤️ ${b} = %${score} → ${txt}`);
}

// UI ANIMACIÓN
function show(id,text){
const el=document.getElementById(id);
el.innerText=text;
el.classList.add("show");
}
</script>

</body>
</html>
